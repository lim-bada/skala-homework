<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HTML CSS JavaScript 퀴즈</title>

    <link rel="stylesheet" href="../css/quiz_style.css">
</head>

<body>
    <main class="quiz-container">
        <header>
            <h1>📝 Web Wrap-up Quiz</h1>
            <p>HTML, CSS, JavaScript 학습 내용을 확인해보세요.</p>
        </header>

        <section class="quiz-box">
            <div class="quiz-info">
                <span id="question-number">문제 1 / 5</span>
                <span id="score">점수: 0</span>
            </div>

            <h2 id="question">
                문제가 여기에 표시됩니다.
            </h2>

            <div id="answer-buttons" class="answer-buttons">
                <!-- JavaScript로 보기 버튼 생성 -->
            </div>

            <p id="result-message" class="result-message">
                정답이라고 생각하는 보기를 선택하세요.
            </p>

            <button
                type="button"
                id="next-btn"
                class="next-btn"
                hidden
            >
                다음 문제
            </button>
        </section>

        <section id="final-box" class="final-box" hidden>
            <h2>퀴즈 완료!</h2>

            <p id="final-score"></p>

            <button type="button" id="restart-btn">
                다시 풀기
            </button>
        </section>
    </main>

    <script src="../js/quiz.js"></script>
</body>
</html>
