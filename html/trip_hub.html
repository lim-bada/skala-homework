<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>나의 여행지 Hub</title>

<body>
    <header>
        <h1>🌍 나의 여행지 Hub</h1>
        <p>기억에 남는 여행지와 여행 정보를 소개합니다.</p>

    <hr>

    <main>
        <section>
            <h2>코난 해변</h2>

            <img
                src="../media/코난해변.jpeg"
                alt="제주 코난해변"

            <p>
                제주도 코난해변입니다. 가끔 돌고래를 볼 수 있습니다.

            <ul>
                <li>모래 찜질</li>
                <li>해수욕</li>

        <!-- 새롭게 추가한 section -->
        <section>
            <h2>여행 준비 팁</h2>

            <p>
                여행 전에 날씨를 확인하고 걷기 편한 신발을 준비하는 것이 좋습니다.
            </p>

            <ul>
                <li>편한 운동화 준비하기</li>
                <li>보조 배터리 챙기기</li>
                <li>신분증과 숙소 주소 확인하기</li>
            </ul>

    <hr>

    <footer>
        <p>작성자: 임해안</p>
    </footer>
