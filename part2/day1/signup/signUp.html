<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <header class="page-header">
        <h1>👤 SKALA 회원가입</h1>
        <p>회원 정보를 입력하고 새로운 여정을 시작해 보세요.</p>
    </header>

    <main class="container">
        <form action="result.html" method="get">

            <!-- 계정 정보 -->
            <fieldset>
                <legend>계정 정보</legend>

                <div class="form-group">
                    <label for="userId">아이디 <span class="required">*</span></label>
                    <input
                        type="text"
                        id="userId"
                        name="userId"
                        placeholder="영문/숫자 4~12자"
                        pattern="[A-Za-z0-9]{4,12}"
                        title="영문과 숫자를 사용하여 4~12자로 입력하세요."
                        autocomplete="username"
                        autofocus
                        required
                    >
                    <small>영문과 숫자를 사용하여 4~12자로 입력하세요.</small>
                </div>

                <div class="form-group">
                    <label for="userPw">비밀번호 <span class="required">*</span></label>
                    <input
                        type="password"
                        id="userPw"
                        name="userPw"
                        placeholder="8자 이상 입력"
                        minlength="8"
                        maxlength="20"
                        autocomplete="new-password"
                        required
                    >
                    <small>비밀번호는 8자 이상 입력해야 합니다.</small>
                </div>

                <div class="form-group">
                    <label for="userEmail">이메일 <span class="required">*</span></label>
                    <input
                        type="email"
                        id="userEmail"
                        name="userEmail"
                        placeholder="example@email.com"
                        autocomplete="email"
                        required
                    >
                </div>

            </fieldset>

            <!-- 개인 정보 -->
            <fieldset>
                <legend>개인 정보</legend>

                <div class="form-group">
                    <label for="userName">
                        이름 <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        id="userName"
                        name="userName"
                        placeholder="이름을 입력하세요"
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="userBirth">생년월일</label>
                    <input
                        type="date"
                        id="userBirth"
                        name="userBirth"
                    >
                </div>

                <div class="form-group">
                    <label for="userTel">전화번호</label>
                    <input
                        type="tel"
                        id="userTel"
                        name="userTel"
                        placeholder="010-0000-0000"
                        pattern="010-[0-9]{4}-[0-9]{4}"
                        title="010-0000-0000 형식으로 입력하세요."
                        autocomplete="tel"
                    >
                    <small>예: 010-1234-5678</small>
                </div>

                <div class="form-group">
                    <span class="group-label">성별</span>

                    <div class="choice-group">
                        <label>
                            <input
                                type="radio"
                                name="gender"
                                value="남성"
                            >
                            남성
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="gender"
                                value="여성"
                            >
                            여성
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="gender"
                                value="선택 안 함"
                                checked
                            >
                            선택 안 함
                        </label>
                    </div>
                </div>

            </fieldset>

            <!-- 관심 정보 -->
            <fieldset>
                <legend>관심 정보</legend>

                <div class="form-group">
                    <span class="group-label">관심 분야</span>

                    <div class="checkbox-group">
                        <label>
                            <input
                                type="checkbox" name="interest" value="프론트엔드"
                            >
                            프론트엔드
                        </label>

                        <label>
                            <input
                                type="checkbox" name="interest" value="백엔드"
                            >
                            백엔드
                        </label>

                        <label>
                            <input
                                type="checkbox" name="interest" value="UI/UX 디자인"
                            >
                            UI/UX 디자인
                        </label>

                        <label>
                            <input
                                type="checkbox" name="interest" value="데이터베이스"
                            >
                            데이터베이스
                        </label>

                        <label>
                            <input
                                type="checkbox" name="interest" alue="클라우드"
                            >
                            클라우드
                        </label>
                    </div>

                    <small>관심 분야는 여러 개 선택할 수 있습니다.</small>
                </div>

                <div class="form-group">
                    <label for="region">거주 지역</label>

                    <select id="region" name="region">
                        <option value="">지역을 선택하세요</option>
                        <option value="서울">서울</option>
                        <option value="경기">경기</option>
                        <option value="인천">인천</option>
                        <option value="광주">광주</option>
                        <option value="전북">전북</option>
                        <option value="부산">부산</option>
                        <option value="대구">대구</option>
                        <option value="대전">대전</option>
                        <option value="기타">기타</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="intro">자기소개</label>

                    <textarea
                        id="intro"
                        name="intro"
                        rows="5"
                        maxlength="200"
                        placeholder="간단한 자기소개나 가입 인사를 입력하세요. (최대 200자)"
                    ></textarea>
                </div>

            </fieldset>

            <!-- 약관 동의 -->
            <fieldset>
                <legend>약관 동의</legend>

                <div class="agreement-box">
                    <p>
                        회원가입을 진행하려면 개인정보 수집 및 이용에 동의해야 합니다.
                    </p>

                    <label class="agreement-label">
                        <input
                            type="checkbox"
                            id="agree"
                            name="agree"
                            value="동의함"
                            required
                        >
                        개인정보 수집 및 이용에 동의합니다.
                        <span class="required">*</span>
                    </label>
                </div>
            </fieldset>
            
            <!-- 제출 및 초기화 버튼 -->
            <div class="button-group">
                <button type="submit" class="btn btn-primary">
                    회원가입
                </button>

                <button type="reset" class="btn btn-reset">
                    다시 작성
                </button>
            </div>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 SKALA 회원가입 실습</p>
    </footer>

</body>
</html>
